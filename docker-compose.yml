services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done
        mc mb --ignore-existing local/${S3_BUCKET:-rag-raw}
        mc anonymous set private local/${S3_BUCKET:-rag-raw}
    restart: "no"

  py-rag-service:
    build:
      context: ./py-rag-service
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  py-worker:
    build:
      context: ./py-worker
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  go-api:
    build:
      context: ./go-api
    environment:
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://rag:rag@postgres:5432/rag?sslmode=disable}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://py-rag-service:8000}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-524288000}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-120}
      ADMIN_USER_ID: ${ADMIN_USER_ID:-11111111-1111-1111-1111-111111111111}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      MEMBER_USER_ID: ${MEMBER_USER_ID:-22222222-2222-2222-2222-222222222222}
      MEMBER_EMAIL: ${MEMBER_EMAIL:-member@local}
      MEMBER_PASSWORD: ${MEMBER_PASSWORD:-ChangeMe123!}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      py-rag-service:
        condition: service_started

volumes:
  postgres_data:
  qdrant_data:
  minio_data:

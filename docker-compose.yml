x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    build:
      context: ./infra/postgres
      dockerfile: postgres.Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  db-bootstrap:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      PGHOST: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:-rag}
    volumes:
      - ./infra/postgres/init/000_dual_kernel_bootstrap.sh:/bootstrap/000_dual_kernel_bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap/000_dual_kernel_bootstrap.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    logging: *default-logging

  novel-service:
    build:
      context: .
      dockerfile: apps/backend/novel-service/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-env}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-720}
      ADMIN_USER_ID: ${ADMIN_USER_ID:-11111111-1111-1111-1111-111111111111}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      MEMBER_USER_ID: ${MEMBER_USER_ID:-22222222-2222-2222-2222-222222222222}
      MEMBER_EMAIL: ${MEMBER_EMAIL:-member@local}
      MEMBER_PASSWORD: ${MEMBER_PASSWORD:-ChangeMe123!}
      NOVEL_DATABASE_DSN: ${NOVEL_DATABASE_DSN:-postgresql://rag:rag@postgres:5432/novel_app}
      NOVEL_BLOB_ROOT: /data/novel
    volumes:
      - ./data/novel:/data/novel
    ports:
      - "${NOVEL_HOST_PORT:-8100}:8100"
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/healthz', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  kb-service:
    build:
      context: .
      dockerfile: apps/backend/kb-service/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-env}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-720}
      ADMIN_USER_ID: ${ADMIN_USER_ID:-11111111-1111-1111-1111-111111111111}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      MEMBER_USER_ID: ${MEMBER_USER_ID:-22222222-2222-2222-2222-222222222222}
      MEMBER_EMAIL: ${MEMBER_EMAIL:-member@local}
      MEMBER_PASSWORD: ${MEMBER_PASSWORD:-ChangeMe123!}
      KB_DATABASE_DSN: ${KB_DATABASE_DSN:-postgresql://rag:rag@postgres:5432/kb_app}
      KB_BLOB_ROOT: /data/kb
    volumes:
      - ./data/kb:/data/kb
    ports:
      - "${KB_HOST_PORT:-8300}:8200"
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/healthz', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  gateway:
    build:
      context: .
      dockerfile: apps/backend/gateway/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-env}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-720}
      ADMIN_USER_ID: ${ADMIN_USER_ID:-11111111-1111-1111-1111-111111111111}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      MEMBER_USER_ID: ${MEMBER_USER_ID:-22222222-2222-2222-2222-222222222222}
      MEMBER_EMAIL: ${MEMBER_EMAIL:-member@local}
      MEMBER_PASSWORD: ${MEMBER_PASSWORD:-ChangeMe123!}
      GATEWAY_TIMEOUT_SECONDS: ${GATEWAY_TIMEOUT_SECONDS:-180}
      NOVEL_SERVICE_URL: ${NOVEL_SERVICE_URL:-http://novel-service:8100}
      KB_SERVICE_URL: ${KB_SERVICE_URL:-http://kb-service:8200}
      AI_CHAT_ENABLED: ${AI_CHAT_ENABLED:-true}
      AI_PROVIDER: ${AI_PROVIDER:-openai-compatible}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_CHAT_TIMEOUT_SECONDS: ${AI_CHAT_TIMEOUT_SECONDS:-120}
      AI_DEFAULT_TEMPERATURE: ${AI_DEFAULT_TEMPERATURE:-0.7}
      AI_DEFAULT_MAX_TOKENS: ${AI_DEFAULT_MAX_TOKENS:-2048}
      AI_SYSTEM_PROMPT: ${AI_SYSTEM_PROMPT:-}
      AI_EXTRA_BODY_JSON: ${AI_EXTRA_BODY_JSON:-{}}
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    depends_on:
      novel-service:
        condition: service_healthy
      kb-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

volumes:
  postgres_data:
